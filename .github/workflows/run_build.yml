name: Build Tarball

on:
  workflow_call: {}

jobs:
  tar:
    name: Tarball (${{ matrix.system }}) 🛠️
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            system: x86_64
            config: default
            filename: nixos.wsl
          - runner: ubuntu-24.04-arm
            system: aarch64
            config: aarch64
            filename: nixos.aarch64.wsl
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install Nix ❄️
        uses: ./.github/actions/install-nix

      - name: Set Version 🏷️
        uses: ./.github/actions/version
        id: version

      - name: Summary Headline 📝
        run: echo '## NixOS-WSL ${{ steps.version.outputs.version }}' >> $GITHUB_STEP_SUMMARY

      - name: Build Tarball 🛠️
        uses: ./.github/actions/build-wsl-tarball
        with:
          config: ${{ matrix.config }}
          filename: ${{ matrix.filename }}

      - name: Upload Tarball 📤
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tarball-${{ matrix.system }}
          path: ${{ matrix.filename }}
