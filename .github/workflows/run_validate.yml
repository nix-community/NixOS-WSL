name: Validate Tarball

on:
  workflow_call: {}

jobs:
  validate:
    name: Validate Tarball (${{ matrix.system }}) 🩺
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - system: x86_64
            artifact: tarball-x86_64
            filename: nixos.wsl
          - system: aarch64
            artifact: tarball-aarch64
            filename: nixos.aarch64.wsl
    steps:
      - name: Checkout WSL Repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: microsoft/WSL
          ref: 2.6.3

      - name: Install dependencies 📦
        shell: bash
        run: |
          pip3 install -r distributions/requirements.txt

      - name: Download Tarball 📥
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ matrix.artifact }}

      - name: Validate Tarball 🩺
        shell: bash
        run: |
          python3 distributions/validate-modern.py --tar ${{ matrix.filename }}
